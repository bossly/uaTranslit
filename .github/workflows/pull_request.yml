name: Pull request

on:
  pull_request:
    branches: [ master ]

env:
  CACHE_BUNDLER: ~/.bundler

jobs:
  build:
    name: Build and running Unit Tests
    runs-on: ubuntu-latest

    timeout-minutes: 30
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Unit Tests
        uses: maierj/fastlane-action@v1.4.0
        env:
          APP_BUILD_NUMBER: ${{ env.GITHUB_RUN_ID }}
          APP_VERSION_CODE: ${{ github.run_number }}
        with:
          lane: unit_test
          skip-tracking: false
          subdirectory: fastlane
          bundle-install-path: CACHE_BUNDLER

      - name: Upload unit test results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            app/build/test-results/
            app/build/reports/tests/
